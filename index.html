<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NARA · Asesora IA PPA Central</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   TOKENS — WCAG AA compliant (contraste ≥4.5:1)
   Fondo: #0A0A0A  Texto: #F5F2EE = 14.2:1 ✓
   Fondo: #0A0A0A  Naranja: #FF6B1A = 4.8:1 ✓
══════════════════════════════════════ */
:root{
  /* Fondos */
  --bg:       #0A0A0A;
  --bg1:      #131313;
  --bg2:      #1A1A1A;
  --bg3:      #222222;
  --bg4:      #2C2C2C;
  --border:   #333333;
  --border2:  #444444;

  /* Texto — todos ≥4.5:1 sobre fondos oscuros */
  --txt:      #F5F2EE;   /* Principal — 14.2:1 */
  --txt2:     #C8C4BC;   /* Secundario — 8.1:1 */
  --txt3:     #8A8680;   /* Muted — 4.6:1 ✓ */

  /* Marca */
  --naranja:  #FF6B1A;   /* 4.8:1 sobre #0A0A0A ✓ */
  --naranja2: #E85C00;
  --naranja3: #FF8C3A;
  --naranja-bg:#FF6B1A18;

  /* Semánticos */
  --verde:    #22C55E;
  --verde-bg: #22C55E15;
  --azul:     #60A5FA;

  /* Tipografía */
  --font-title: 'Montserrat', sans-serif;
  --font-body:  'Inter', sans-serif;
  --font-mono:  'JetBrains Mono', monospace;

  /* Segmentos Tribu Naranja */
  --l01: #005293;
  --l02: #4D4F53;
  --l03: #F15A22;
  --l04: #981E32;
}

/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);overflow:hidden;}
body{
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  color: var(--txt);
  display:flex;
  flex-direction:column;
  max-width:480px;
  margin:0 auto;
}

/* ══════════════════════════════════════
   TOPBAR NARA
══════════════════════════════════════ */
.topbar{
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 10;
}
.tl-left{ display:flex; align-items:center; gap:12px; }
.tl-right{ display:flex; align-items:center; gap:8px; }
.tl-name{
  font-family: var(--font-title);
  font-weight: 800;
  font-size: 17px;
  letter-spacing: .06em;
  color: var(--naranja);
}
.tl-sub{
  font-family: var(--font-body);
  font-size: 10px;
  color: var(--txt3);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-top: 1px;
}
.tl-status{
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--txt3);
  letter-spacing: .06em;
  text-transform: uppercase;
}
.status-dot{
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--verde);
  box-shadow: 0 0 6px var(--verde);
}
.cloud-dot{width:6px;height:6px;border-radius:50%;background:var(--txt3);}
.cloud-dot.ok{background:var(--verde);}

/* ══════════════════════════════════════
   HERO NARA — grande y visual
══════════════════════════════════════ */
.nara-hero{
  background: var(--bg1);
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.nara-hero::before{
  content:'';
  position:absolute;
  top:-40px; right:-40px;
  width:180px; height:180px;
  border-radius:50%;
  background: radial-gradient(circle, #FF6B1A15 0%, transparent 70%);
  pointer-events:none;
}
.hero-inner{ display:flex; align-items:center; gap:16px; }
.hero-icon{ flex-shrink:0; position:relative; }
.hero-text{ flex:1; min-width:0; }
.hero-greeting{
  font-family: var(--font-title);
  font-weight: 800;
  font-size: 22px;
  color: var(--naranja);
  letter-spacing: .03em;
  line-height: 1.1;
}
.hero-tagline{
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--txt2);
  margin-top: 5px;
  line-height: 1.5;
}

/* ══════════════════════════════════════
   CHAT CONTAINER
══════════════════════════════════════ */
.chat-scroll{
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 14px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── Burbujas NARA (izquierda) ── */
.bubble-nara{
  display: flex;
  align-items: flex-start;
  gap: 9px;
  max-width: 92%;
  align-self: flex-start;
}
.bubble-avatar{
  flex-shrink:0;
  width: 30px; height: 30px;
  margin-top: 2px;
}
.bubble-body{ flex:1; min-width:0; }
.bubble-name{
  font-family: var(--font-title);
  font-weight: 700;
  font-size: 10px;
  color: var(--naranja);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.bubble-txt{
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
  padding: 11px 14px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--txt);
  line-height: 1.6;
}
.bubble-txt strong{
  color: var(--naranja3);
  font-weight: 600;
}
.bubble-meta{
  font-size: 10px;
  color: var(--txt3);
  margin-top: 4px;
  margin-left: 2px;
}

/* ── Burbujas cliente (derecha) ── */
.bubble-user{
  align-self: flex-end;
  max-width: 78%;
}
.bubble-user .bubble-txt{
  background: var(--naranja2);
  border-color: var(--naranja);
  border-radius: 14px 4px 14px 14px;
  color: #fff;
  font-size: 13px;
}
.bubble-user .bubble-meta{
  text-align: right;
}

/* ── Opciones de respuesta ── */
.opciones-grid{
  display: grid;
  gap: 8px;
  margin-top: 4px;
  align-self: flex-start;
  width: 100%;
  max-width: 340px;
}
.opciones-grid.col2{ grid-template-columns: 1fr 1fr; }
.opciones-grid.col1{ grid-template-columns: 1fr; }
.opcion-btn{
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 10px 13px;
  cursor: pointer;
  transition: all .18s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
}
.opcion-btn:active{ transform: scale(.97); }
.opcion-btn:hover{ border-color: var(--naranja); background: var(--naranja-bg); }
.opcion-btn.sel{
  border-color: var(--naranja);
  background: var(--naranja-bg);
}
.op-icon{ font-size: 20px; flex-shrink:0; }
.op-lbl{
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 13px;
  color: var(--txt);
  line-height: 1.3;
}
.op-sub{
  font-size: 10px;
  color: var(--txt3);
  margin-top: 1px;
}

/* ── Typing indicator ── */
.typing{
  display: flex;
  align-items: flex-start;
  gap: 9px;
  align-self: flex-start;
}
.typing-dots{
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
  padding: 12px 16px;
  display: flex;
  gap: 4px;
  align-items: center;
}
.typing-dots span{
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--txt3);
  animation: typingBounce 1.2s infinite;
}
.typing-dots span:nth-child(2){ animation-delay:.2s; }
.typing-dots span:nth-child(3){ animation-delay:.4s; }
@keyframes typingBounce{
  0%,80%,100%{ transform:translateY(0); opacity:.5; }
  40%{ transform:translateY(-6px); opacity:1; }
}

/* ── Separador de fecha ── */
.chat-date{
  text-align: center;
  font-size: 10px;
  color: var(--txt3);
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 4px 0;
}

/* ══════════════════════════════════════
   INPUT ÁREA — captura de datos
══════════════════════════════════════ */
.input-card{
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-top: 4px;
  align-self: flex-start;
  width: 100%;
  max-width: 340px;
}
.input-label{
  font-family: var(--font-title);
  font-weight: 700;
  font-size: 10px;
  color: var(--naranja);
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.nara-input{
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 13px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--txt);
  margin-bottom: 8px;
  outline: none;
  transition: border-color .2s;
}
.nara-input::placeholder{ color: var(--txt3); }
.nara-input:focus{ border-color: var(--naranja); }
.btn-primary{
  width: 100%;
  background: var(--naranja2);
  color: #fff;
  font-family: var(--font-title);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: .04em;
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: all .18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-primary:active{ transform: scale(.98); }
.btn-primary:hover{ background: var(--naranja); }

/* ══════════════════════════════════════
   TARJETAS DE PROPUESTA
══════════════════════════════════════ */
.propuesta-wrap{
  align-self: flex-start;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 360px;
}
.prop-card{
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color .2s;
}
.prop-card.recomendado{ border-color: var(--naranja); }
.prop-header{
  padding: 10px 13px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.prop-badge{
  font-family: var(--font-title);
  font-weight: 700;
  font-size: 9px;
  letter-spacing: .15em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--naranja-bg);
  color: var(--naranja3);
  border: 1px solid var(--naranja)44;
}
.prop-badge.rec{ background: var(--naranja2); color:#fff; border-color: var(--naranja2); }
.prop-body{ padding: 11px 13px 12px; }
.prop-nombre{
  font-family: var(--font-title);
  font-weight: 700;
  font-size: 14px;
  color: var(--txt);
  line-height: 1.3;
}
.prop-sku{
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--txt3);
  margin-top: 4px;
}
.prop-specs{
  display: flex;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.prop-spec{
  font-size: 10px;
  color: var(--txt2);
  background: var(--bg3);
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
}
.prop-precio{
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 18px;
  color: var(--naranja3);
  margin-top: 9px;
}
.prop-precio-lbl{
  font-size: 10px;
  color: var(--txt3);
  margin-top: 2px;
}
.prop-razon{
  font-size: 12px;
  color: var(--txt2);
  margin-top: 8px;
  line-height: 1.5;
  border-top: 1px solid var(--border);
  padding-top: 8px;
}

/* ── Nota de accesorios y precios ── */
.prop-nota{
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 13px;
  font-size: 12px;
  color: var(--txt2);
  line-height: 1.6;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.prop-nota-icon{ font-size: 16px; flex-shrink:0; }

/* ── Cremallera extra ── */
.crem-card{
  background: var(--naranja-bg);
  border: 1px solid var(--naranja)44;
  border-radius: 10px;
  padding: 10px 13px;
  font-size: 12px;
  color: var(--txt);
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ══════════════════════════════════════
   BOTÓN WHATSAPP FINAL
══════════════════════════════════════ */
.btn-wa{
  background: #25D366;
  color: #fff;
  font-family: var(--font-title);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: .03em;
  padding: 14px 20px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: all .18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  max-width: 340px;
  align-self: flex-start;
}
.btn-wa:active{ transform: scale(.98); }
.btn-wa svg{ width:20px; height:20px; }

/* ── Botón visita ── */
.btn-visita{
  background: var(--bg2);
  border: 1px solid var(--naranja);
  color: var(--naranja3);
  font-family: var(--font-title);
  font-weight: 700;
  font-size: 13px;
  padding: 11px 16px;
  border-radius: 10px;
  cursor: pointer;
  transition: all .18s;
  width: 100%;
  max-width: 340px;
  align-self: flex-start;
}
.btn-visita-no{
  background: none;
  border: 1px solid var(--border);
  color: var(--txt3);
  font-family: var(--font-body);
  font-size: 12px;
  padding: 9px 14px;
  border-radius: 10px;
  cursor: pointer;
  width: 100%;
  max-width: 340px;
  align-self: flex-start;
}

/* ══════════════════════════════════════
   ANIMACIONES
══════════════════════════════════════ */
@keyframes ripple1{ 0%{r:0;opacity:.9} 100%{r:14;opacity:0} }
@keyframes ripple2{ 0%{r:0;opacity:.75} 100%{r:24;opacity:0} }
@keyframes ripple3{ 0%{r:0;opacity:.5} 100%{r:34;opacity:0} }
@keyframes ripple4{ 0%{r:0;opacity:.25} 100%{r:40;opacity:0} }
@keyframes fadeUp{
  from{ opacity:0; transform:translateY(10px); }
  to{ opacity:1; transform:translateY(0); }
}
.anim{ animation: fadeUp .35s ease forwards; }

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
.toast{
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--txt);
  font-family: var(--font-body);
  font-size: 13px;
  padding: 10px 18px;
  border-radius: 30px;
  opacity: 0;
  pointer-events: none;
  transition: all .3s;
  z-index: 100;
  white-space: nowrap;
}
.toast.show{
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<!-- ══ HERO NARA — grande y visual ══ -->
<div style="

// GOOGLE SHEETS
// ══════════════════════════════════════
async function cargarSheets(){
  try{
    const res = await Promise.race([
      fetch(SHEETS_URL),
      new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),4000))
    ]);
    const txt = await res.text();
    const m = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if(!m) throw new Error('formato');
    const rows = JSON.parse(m[1])?.table?.rows||[];
    rows.forEach(row=>{
      const sku=row.c?.[4]?.v, psvp=row.c?.[10]?.v;
      if(sku&&psvp&&typeof psvp==='number'&&psvp>0) preciosSheets[String(sku).trim()]=psvp;
    });
    sheetsOk = Object.keys(preciosSheets).length>0;
    if(sheetsOk){
      getCatalogoFlat().forEach(e=>{ if(preciosSheets[e.sku]) e.p=preciosSheets[e.sku]; });
      const dot=document.getElementById('cloudDot');
      if(dot){ dot.classList.add('ok'); dot.title='✅ Precios actualizados'; }
    }
  }catch(e){ console.warn('Sheets:', e.message); }
}

// BITRIX24
// ══════════════════════════════════════
async function enviarBitrix(nombre, wa, datos, recomendaciones){
  if(location.protocol==='file:') return;
  try{
    const tel = wa.replace(/\D/g,'');
    const seg = SEG[datos.lugar]||SEG.casa;
    const equipo = recomendaciones[0]?.nombre||'—';
    const contacto = new URLSearchParams();
    contacto.append('fields[NAME]', nombre.split(' ')[0]||nombre);
    contacto.append('fields[LAST_NAME]', nombre.split(' ').slice(1).join(' ')||'');
    if(tel) contacto.append('fields[PHONE][0][VALUE]',`+57${tel}`);
    contacto.append('fields[PHONE][0][VALUE_TYPE]','MOBILE');
    contacto.append('fields[SOURCE_ID]','WEB');
    contacto.append('fields[SOURCE_DESCRIPTION]','NARA · Asesora IA PPA Central');
    contacto.append('fields[COMMENTS]',
      `Segmento: ${seg.n} | Tipo: ${datos.tipo} | Trafico: ${datos.trafico} | Visita: ${motivarVisita?'SÍ':'No solicitada'} | Equipo recomendado: ${equipo}`
    );
    const rc = await fetch(`${BITRIX_HOOK}crm.contact.add`,{method:'POST',body:contacto});
    const dc = await rc.json();
    const cid = dc?.result||null;
    const neg = new URLSearchParams();
    neg.append('fields[TITLE]',`NARA · ${nombre} | ${equipo}`);
    neg.append('fields[STAGE_ID]','NEW');
    neg.append('fields[SOURCE_ID]','WEB');
    neg.append('fields[CURRENCY_ID]','COP');
    if(cid) neg.append('fields[CONTACT_ID]',String(cid));
    neg.append('fields[COMMENTS]',`Captado por NARA · PPA Central | ${seg.n} | ${datos.tipo} | Visita: ${motivarVisita?'SÍ':'No'}`);
    await fetch(`${BITRIX_HOOK}crm.deal.add`,{method:'POST',body:neg});
    toast('✅ Tu información fue recibida');
  }catch(e){ console.warn('Bitrix:',e.message); }
}

function toast(msg, dur=3000){
  const el = document.getElementById('toast');

}

function hora(){
  const d = new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

  const d = new Date();

// Agrega burbuja de NARA
function naraMsg(html, delay=0){
  return new Promise(res=>{
    setTimeout(()=>{
      // typing primero
      const typing = document.createElement('div');
      typing.className='typing anim';
      typing.innerHTML=`<div class="bubble-avatar">${avatarSVG(28)}</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>`;
      chat.appendChild(typing);
      scrollBottom();

      setTimeout(()=>{
        typing.remove();
        const wrap = document.createElement('div');
        wrap.className='bubble-nara anim';
        wrap.innerHTML=`
          <div class="bubble-avatar">${avatarSVG(28)}</div>
          <div class="bubble-body">
            <div class="bubble-name">NARA</div>
            <div class="bubble-txt">${html}</div>
            <div class="bubble-meta">${hora()} ✓✓</div>
          </div>`;
        chat.appendChild(wrap);
        scrollBottom();
        res();
      }, 900);
    }, delay);
  });
}

// Agrega burbuja de usuario
function userMsg(texto){
  const wrap = document.createElement('div');
  wrap.className='bubble-user anim';
  wrap.innerHTML=`
    <div class="bubble-txt">${texto}</div>
    <div class="bubble-meta">${hora()}</div>`;
  chat.appendChild(wrap);
  scrollBottom();
}

// Agrega opciones
function agregarOpciones(opciones, cols, onSel){
  const grid = document.createElement('div');
  grid.className=`opciones-grid ${cols===2?'col2':'col1'} anim`;
  grid.id='opciones-activas';
  opciones.forEach(op=>{
    const btn = document.createElement('div');
    btn.className='opcion-btn';
    btn.innerHTML=`<div class="op-icon">${op.icon}</div>
      <div><div class="op-lbl">${op.lbl}</div>${op.sub?`<div class="op-sub">${op.sub}</div>`:''}</div>`;
    btn.onclick=()=>{
      document.querySelectorAll('#opciones-activas .opcion-btn').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
      setTimeout(()=>{ grid.remove(); onSel(op); }, 300);
    };
    grid.appendChild(btn);
  });
  chat.appendChild(grid);
  scrollBottom();
}

async function iniciarNara(){
  setFecha();

  // MSG 1 — Gancho SSG
  await naraMsg(`<strong>¿Todavía abres el portón a mano?</strong><br><br>Eso tiene solución exacta. Dame 30 segundos y te lo resuelvo. 🔶`, 400);

  await new Promise(res=>{

      {icon:'▶', lbl:'¡Listo, dame 30 segundos!', sub:''}

  // MSG 2 — Segmento (4 Tribu Naranja)
  await naraMsg(`¡Qué bueno! Cuéntame — <strong>¿dónde está ese acceso que necesitas automatizar?</strong>`);

  await new Promise(res=>{
    agregarOpciones([
      {icon:'🏠', lbl:'Mi casa',             sub:'Casa, finca o apartamento'},
      {icon:'🏘', lbl:'Mi conjunto',         sub:'Condominio o unidad residencial'},
      {icon:'🏪', lbl:'Mi negocio',          sub:'Local, oficina o comercio'},
      {icon:'🏭', lbl:'Mi industria/bodega', sub:'Planta, bodega o sector industrial'},
    ], 2, op=>{
      const lbl = op.lbl.toLowerCase().replace('mi ','');
      respuestas.lugar = lbl==='casa'?'casa':lbl.includes('conjunto')?'conjunto':lbl.includes('negocio')?'negocio':'industria';
      userMsg(op.icon+' '+op.lbl);
      res();
    });
  });

  // MSG 3 — Tipo de acceso
  await naraMsg(`¡Perfecto! ¿Y qué es lo que necesitas que se <strong>abra solito</strong>?`);

  await new Promise(res=>{
    agregarOpciones([
      {icon:'🚗', lbl:'Portón corredera',   sub:'Se desliza a un lado'},
      {icon:'🚪', lbl:'Portón batiente',    sub:'Abre hacia adentro o afuera'},
      {icon:'🚧', lbl:'Barrera vehicular',  sub:'Control de parqueadero'},
      {icon:'🏪', lbl:'Cortina metálica',   sub:'Local comercial'},
      {icon:'🏠', lbl:'Garaje seccional',   sub:'Sube verticalmente'},
    ], 2, op=>{
      const t = op.lbl.toLowerCase();
      respuestas.tipo = t.includes('corredera')?'corredera':t.includes('batiente')?'batiente':t.includes('barrera')?'barrera':t.includes('cortina')?'cortina':'seccional';
      userMsg(op.icon+' '+op.lbl);
      res();
    });
  });

  // MSG 4 — Medida (adaptada al tipo)
  if(respuestas.tipo==='barrera'){
    await naraMsg(`Una cosa importante — ¿<strong>cuánto mide el carril</strong> que necesitas cubrir?`);
    await new Promise(res=>{
      agregarOpciones([
        {icon:'📏', lbl:'Hasta 3 metros',   sub:'Acceso pequeño'},
        {icon:'📏', lbl:'Entre 3 y 4 metros',sub:'Acceso estándar'},
        {icon:'📏', lbl:'Entre 4 y 4.5 m',  sub:'Acceso amplio'},
        {icon:'📏', lbl:'Entre 4.5 y 6 m',  sub:'Acceso grande'},
      ], 2, op=>{
        const l = op.lbl;
        respuestas.carril = l.includes('3 m')?'3':l.includes('3 y 4')?'4':l.includes('4.5')?'4.5':'5';
        userMsg(op.icon+' '+op.lbl);
        res();
      });
    });
  } else if(respuestas.tipo==='batiente'){
    await naraMsg(`Importante — ¿<strong>cuántas hojas</strong> tiene ese portón?`);
    await new Promise(res=>{
      agregarOpciones([
        {icon:'🚪', lbl:'Una hoja',  sub:'Abre a un solo lado'},
        {icon:'🚪🚪', lbl:'Dos hojas', sub:'Abre al centro'},
      ], 2, op=>{
        respuestas.hojas = op.lbl.includes('Una')?'1':'2';
        userMsg(op.icon+' '+op.lbl);
        res();
      });
    });
    await naraMsg(`¿Y <strong>cuántos metros mide cada hoja</strong>?`);
    await new Promise(res=>{
      agregarOpciones([
        {icon:'📏', lbl:'Hasta 2 metros',   sub:''},
        {icon:'📏', lbl:'Entre 2 y 3.5 m',  sub:''},
        {icon:'📏', lbl:'Entre 3.5 y 4.5 m',sub:''},
        {icon:'📏', lbl:'Más de 4.5 metros', sub:''},
        {icon:'❓', lbl:'No sé exactamente', sub:'Lo medimos en la visita'},
      ], 2, op=>{
        const l = op.lbl;
        respuestas.medida = l.includes('2 m')?1.8:l.includes('2 y 3')?3:l.includes('3.5 y 4')?4:l.includes('4.5')?5:2;
        if(op.lbl.includes('sé')) respuestas.noSabeMedida=true;
        userMsg(op.icon+' '+op.lbl);
        res();
      });
    });
  } else if(respuestas.tipo==='corredera'){
    await naraMsg(`¿Más o menos <strong>cuánto mide ese portón de ancho</strong>?`);
    await new Promise(res=>{
      agregarOpciones([
        {icon:'📏', lbl:'Menos de 3 metros', sub:''},
        {icon:'📏', lbl:'Entre 3 y 4 metros', sub:''},

  // MSG 6 — Captura de datos

function getFraseDinamica(nombre, lugar, tipo){
  const nombreCorto = nombre.split(' ')[0]||nombre;
  const segFrases = FRASES[lugar]||FRASES.casa;
  const tipoFrases = segFrases[tipo]||segFrases.default||FRASES.casa.default;
  const pool = tipoFrases;
  const idx = Math.floor(Math.random()*pool.length);
  return pool[idx](nombreCorto);
}
